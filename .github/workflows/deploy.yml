name: Deploy site

on:
  push:
    branches:
      - main

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install mkdocs-material

      - name: Check mycel-docs changes
        id: mycel_changed
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^mycel-docs/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Check mycelium-docs changes
        id: mycelium_changed
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^mycelium-docs/'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Build mycel docs
        if: steps.mycel_changed.outputs.changed == 'true'
        working-directory: mycel-docs
        run: mkdocs build --site-dir ../docs/docs/mycel

      - name: Build mycelium docs
        if: steps.mycelium_changed.outputs.changed == 'true'
        working-directory: mycelium-docs
        run: mkdocs build --site-dir ../docs/docs/mycelium

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Sync to gh-pages
        run: |
          rsync -av --delete --exclude='docs/mycel' --exclude='docs/mycelium' docs/ gh-pages/
          if [ "${{ steps.mycel_changed.outputs.changed }}" == "true" ]; then
            rsync -av --delete docs/docs/mycel/ gh-pages/docs/mycel/
          fi
          if [ "${{ steps.mycelium_changed.outputs.changed }}" == "true" ]; then
            rsync -av --delete docs/docs/mycelium/ gh-pages/docs/mycelium/
          fi

      - name: Commit and push to gh-pages
        working-directory: gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy from @${{ github.sha }}" || echo "Nothing to commit"
          git push
