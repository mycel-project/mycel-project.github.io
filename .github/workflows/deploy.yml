name: Deploy site

on:
  push:
    branches:
      - main

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install mkdocs-material
          pip install mkdocs-swagger-ui-tag  

      - name: Check changes
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^mycel-docs/'; then
            echo "mycel=true" >> $GITHUB_OUTPUT
          else
            echo "mycel=false" >> $GITHUB_OUTPUT
          fi
          if git diff --name-only HEAD~1 HEAD | grep -q '^mycelium-docs/'; then
            echo "mycelium=true" >> $GITHUB_OUTPUT
          else
            echo "mycelium=false" >> $GITHUB_OUTPUT
          fi

      - name: Build mycel docs
        if: steps.changes.outputs.mycel == 'true'
        working-directory: mycel-docs
        run: mkdocs build --site-dir ../docs/docs/mycel

      - name: Build mycelium docs
        if: steps.changes.outputs.mycelium == 'true'
        working-directory: mycelium-docs
        run: mkdocs build --site-dir ../docs/docs/mycelium

      - name: Deploy to gh-pages
        run: |
          set -e
          rm -rf /tmp/gh-pages
          git clone --branch gh-pages --single-branch \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
            /tmp/gh-pages
          git config --global --add safe.directory /tmp/gh-pages

          rsync -av --delete \
            --exclude='.git' \
            --exclude='docs/mycel' \
            --exclude='docs/mycelium' \
            docs/ /tmp/gh-pages/

          if [ "${{ steps.changes.outputs.mycel }}" == "true" ]; then
            rsync -av --delete --exclude='.git' docs/docs/mycel/ /tmp/gh-pages/docs/mycel/
          fi
          if [ "${{ steps.changes.outputs.mycelium }}" == "true" ]; then
            rsync -av --delete --exclude='.git' docs/docs/mycelium/ /tmp/gh-pages/docs/mycelium/
          fi

          cd /tmp/gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy from @${{ github.sha }}" || echo "Nothing to commit"
          git push
